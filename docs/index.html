<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LRFA Tools</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">&gt;_</span>
        <div>
          <h1>LRFA Tools</h1>
          <p class="brand-sub">Scripts &middot; Commands &middot; Bookmarks</p>
        </div>
      </div>
      <a class="github-link" href="https://github.com/lachlanalston/SupportTools" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" fill="currentColor" width="18" height="18"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub
      </a>
    </div>
  </header>

  <main>
    <div class="search-bar-wrap">
      <div class="search-icon">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
      </div>
      <input
        type="search"
        id="search"
        class="search-input"
        placeholder="Search scripts, bookmarks, commands…"
        autocomplete="off"
        spellcheck="false"
      />
      <span class="search-hint" id="search-hint">Press <kbd>/</kbd> to focus</span>
    </div>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="scripts" role="tab" aria-selected="true">
        Scripts
        <span class="tab-count" id="count-scripts">0</span>
      </button>
      <button class="tab" data-tab="commands" role="tab" aria-selected="false">
        Commands
        <span class="tab-count" id="count-commands">0</span>
      </button>
      <button class="tab" data-tab="shortcuts" role="tab" aria-selected="false">
        Shortcuts
        <span class="tab-count" id="count-shortcuts">0</span>
      </button>
      <button class="tab" data-tab="bookmarks" role="tab" aria-selected="false">
        Bookmarks
        <span class="tab-count" id="count-bookmarks">0</span>
      </button>
      <button class="tab" data-tab="rfcs" role="tab" aria-selected="false">
        RFCs
        <span class="tab-count" id="count-rfcs">0</span>
      </button>
    </nav>

    <!-- Scripts tab -->
    <div id="tab-scripts" class="tab-panel active">
      <div class="filters" id="script-filters">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="windows">
          <span class="dot dot-windows"></span>Windows
        </button>
        <button class="filter-chip" data-filter="macos">
          <span class="dot dot-macos"></span>macOS
        </button>
        <button class="filter-chip" data-filter="m365">
          <span class="dot dot-m365"></span>M365
        </button>
        <button class="filter-chip" data-filter="api">
          <span class="dot dot-api"></span>API
        </button>
        <button class="filter-chip filter-chip-fix" data-filter="has-fix">
          <svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12"><path d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm11.78-1.72a.75.75 0 0 0-1.06-1.06L6.75 9.19 5.28 7.72a.75.75 0 0 0-1.06 1.06l2 2a.75.75 0 0 0 1.06 0l4.5-4.5z"/></svg>
          Remediates
        </button>
      </div>
      <div class="card-grid" id="scripts-grid"></div>
      <p class="empty-state" id="scripts-empty" hidden>No scripts match your search.</p>
    </div>

    <!-- Commands tab -->
    <div id="tab-commands" class="tab-panel">
      <div class="filters" id="command-filters">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="windows">
          <span class="dot dot-windows"></span>Windows
        </button>
        <button class="filter-chip" data-filter="macos">
          <span class="dot dot-macos"></span>macOS
        </button>
        <button class="filter-chip" data-filter="m365">
          <span class="dot dot-m365"></span>M365
        </button>
      </div>
      <div class="card-grid" id="commands-grid"></div>
      <p class="empty-state" id="commands-empty" hidden>No commands match your search.</p>
    </div>

    <!-- Shortcuts tab -->
    <div id="tab-shortcuts" class="tab-panel">
      <div class="filters" id="shortcut-filters">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="windows">
          <span class="dot dot-windows"></span>Windows
        </button>
        <button class="filter-chip" data-filter="macos">
          <span class="dot dot-macos"></span>macOS
        </button>
      </div>
      <div class="card-grid" id="shortcuts-grid"></div>
      <p class="empty-state" id="shortcuts-empty" hidden>No shortcuts match your search.</p>
    </div>

    <!-- Bookmarks tab -->
    <div id="tab-bookmarks" class="tab-panel">
      <div class="filters" id="bookmark-filters"></div>
      <div class="card-grid" id="bookmarks-grid"></div>
      <p class="empty-state" id="bookmarks-empty" hidden>No bookmarks match your search.</p>
    </div>

    <!-- RFCs tab -->
    <div id="tab-rfcs" class="tab-panel">
      <div class="filters" id="rfc-filters"></div>
      <div class="card-grid" id="rfcs-grid"></div>
      <p class="empty-state" id="rfcs-empty" hidden>No RFCs match your search.</p>
    </div>
  </main>

  <!-- Modal -->
  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
